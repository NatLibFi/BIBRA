name: CI - Cypress E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Start the server
        run: uv run uvicorn bibra.main:app --host 0.0.0.0 --port 8000 &
        timeout-minutes: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Run Cypress tests
        run: npm run cy:run
