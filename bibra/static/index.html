<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIBRA API</title>
    <!-- Bootstrap CSS -->
    <link href="/node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .version {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        p {
            color: #444;
            line-height: 1.6;
        }
        .api-link {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .api-link:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/v0/')
                .then(response => response.json())
                .then(data => {
                    const versionSpan = document.getElementById('version');
                    if (versionSpan && data.version) {
                        versionSpan.textContent = data.version;
                    }
                })
                .catch(err => {
                    console.error('Failed to fetch version:', err);
                });
        });
    </script>
</head>
<body>
    <h1>BIBRA API</h1>
    <p class="version">Version <span id="version">Loading...</span></p>
    <p>Welcome to the BIBRA API. This is a simple static page served at the root URL.</p>
    <p>Visit the <a href="/docs" class="api-link">API Documentation</a> to explore the available endpoints.</p>
    
    <!-- Bootstrap JS (bundle includes Popper) -->
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
